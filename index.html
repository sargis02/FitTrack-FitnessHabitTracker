<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FitTrack - Fitness & Habit Tracker</title>

    <!-- Typography choice: Inter is readable and looks modern for dashboards -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <!-- Header is sticky so users can switch pages quickly while scrolling -->
    <header class="app-header">
      <div class="header-content">
        <div class="header-left">
          <h1 class="app-title">
            <span class="title-icon">&#9883;</span> FitTrack
          </h1>

          <p class="current-date" id="currentDate"></p>
        </div>

        <nav class="header-nav">
          <a href="./index.html" class="nav-link active">Tracker</a>
          <a href="./planning.html" class="nav-link">Planning</a>
          <a href="./devlog.html" class="nav-link">Dev Log</a>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <!-- Layout: left = create + motivation, right = discover + manage -->
      <div class="content-grid">
        <div class="left-column">
          <section class="card form-card">
            <h2 class="card-title">Add Activity</h2>

            <!-- novalidate = I handle validation myself in JS -->
            <form id="activityForm" novalidate>
              <!-- Activity Type -->
              <div class="form-group">
                <label for="activityType">Type</label>
                <select id="activityType" required>
                  <option value="">Select type...</option>
                  <option value="workout">Workout</option>
                  <option value="habit">Habit</option>
                </select>
                <!-- Error message shown in JS -->
                <span class="error-message" id="typeError"></span>
              </div>

              <!-- Activity Name -->
              <div class="form-group">
                <label for="activityName">Activity Name</label>
                <input
                  type="text"
                  id="activityName"
                  placeholder="e.g., Morning Run, Read 30 mins"
                  required
                />
                <span class="error-message" id="nameError"></span>
              </div>

              <!-- Duration / Quantity -->
              <div class="form-group">
                <label for="activityDuration">Duration / Quantity</label>
                <input
                  type="number"
                  id="activityDuration"
                  placeholder="e.g., 30 (minutes)"
                  min="1"
                  required
                />
                <span class="error-message" id="durationError"></span>
              </div>

              <!-- Date -->
              <div class="form-group">
                <label for="activityDate">Date</label>
                <input type="date" id="activityDate" required />
                <span class="error-message" id="dateError"></span>
              </div>

              <!-- Notes -->
              <div class="form-group">
                <label for="activityNotes">Notes (optional)</label>
                <textarea
                  id="activityNotes"
                  rows="3"
                  placeholder="Any additional notes..."
                ></textarea>
              </div>

              <!-- Submit -->
              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  Add Activity
                </button>
              </div>

              <!-- Success message shown after add -->
              <div
                class="success-message"
                id="successMessage"
                style="display: none"
              ></div>
            </form>
          </section>
        </div>

        <!-- Right column: list -->
        <div class="right-column">
          <section class="card activities-card">
            <div class="activities-header">
              <h2 class="card-title">Activities</h2>

              <!-- I update this count in JS -->
              <span class="activity-count" id="activityCount"
                >0 activities</span
              >
            </div>

            <!-- This container is filled by JS -->
            <div class="activities-list" id="activitiesList">
              <!-- Default empty state -->
              <div class="empty-state" id="emptyState">
                <span class="empty-icon">&#128203;</span>
                <p>No activities yet. Add your first activity!</p>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <p>FitTrack &copy; 2026 - Fitness & Habit Tracker | Nafiz Ahmed Sargis</p>
    </footer>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
